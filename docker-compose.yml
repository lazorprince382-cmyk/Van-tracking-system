services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: van_tracker_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pri372#nce
      POSTGRES_DB: van_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: van_tracker_backend
    environment:
      DATABASE_URL: postgresql://postgres:pri372%23nce@postgres:5432/van_tracker
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 8h
      PROXIMITY_RADIUS_METERS: 200
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: van_tracker_frontend
    environment:
      VITE_API_BASE: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

